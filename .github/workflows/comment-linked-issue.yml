name: Comment linked issue

on:
  push:

permissions:
  issues: write
  contents: read

jobs:
  comment:
    runs-on: ubuntu-latest

    steps:
      - name: Extract issue number
        id: extract
        run: |
          MESSAGE="${{ github.event.head_commit.message }}"
          ISSUE_NUMBER=$(echo "$MESSAGE" | grep -oE '#[0-9]+' | head -n 1 | tr -d '#')

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment issue
        if: steps.extract.outputs.found == 'true'
        run: |
          gh issue comment "${{ steps.extract.outputs.issue_number }}" \
            --body "Commit collegato: ${{ github.event.head_commit.url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
